<!-- PUSH NOTIFICATIONS - Colar no <head> do tema da Tray -->
<script>
(function() {
  var VAPID_PUBLIC_KEY = 'BIweDvZ6db8KvqDkbRzrnDCcZTix6c0KRBgyYhy3ZA6Cp4uFLJvcU_HgR-vc_mDRJXyJvItbiLRuXO6DeazmJ-Q';
  var API_URL = 'https://push-promo-system.vercel.app/api/subscribe';

  function urlBase64ToUint8Array(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);
    var outputArray = new Uint8Array(rawData.length);
    for (var i = 0; i < rawData.length; ++i) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }

  function subscribePush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

    navigator.serviceWorker.register('/sw.js').then(function() {
      return Notification.requestPermission();
    }).then(function(permission) {
      if (permission !== 'granted') return;
      return navigator.serviceWorker.ready;
    }).then(function(registration) {
      if (!registration) return;
      return registration.pushManager.getSubscription().then(function(existing) {
        if (existing) return existing;
        return registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      });
    }).then(function(subscription) {
      if (!subscription) return;
      return fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(subscription)
      });
    }).catch(function(err) {
      console.log('Push subscription error:', err);
    });
  }

  // Ativa automaticamente se ?push=1 estiver na URL
  if (window.location.search.indexOf('push=1') !== -1) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', subscribePush);
    } else {
      subscribePush();
    }
  }
})();
</script>
<!-- FIM PUSH NOTIFICATIONS -->
